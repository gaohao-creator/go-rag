  qa_content_vector_field: "qa_content_vector"
  knowledge_field: "_knowledge_name"
  ext_field: "ext"
  dimensions: 1024
  embedding_model: "BAAI/bge-large-zh-v1.5"
  embedding_base_url: "https://api.siliconflow.cn/"
  embedding_api_key: ""

rerank:
  enabled: false
  base_url: ""
